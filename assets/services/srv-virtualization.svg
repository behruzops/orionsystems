<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="hv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <text x="32" y="42" fill="#e6eef8" font-size="18" font-weight="600">Server Virtualization</text>
  <text x="32" y="62" fill="#6b7d99" font-size="12">Proxmox · VMware · Hyper-V</text>

  <!-- VM stack -->
  <g>
    <!-- VM1 -->
    <rect x="32" y="84" width="380" height="40" rx="8" fill="#0f1c33" stroke="#2a3c5e"/>
    <rect x="44" y="96" width="16" height="16" rx="3" fill="#38bdf8"/>
    <text x="72" y="108" fill="#e6eef8" font-size="13" font-weight="600">VM1</text>
    <text x="120" y="108" fill="#6b7d99" font-size="11">Proxmox</text>
    <rect x="210" y="98" width="80" height="6" rx="3" fill="#13243f"/>
    <rect x="210" y="98" width="58" height="6" rx="3" fill="#34d399"/>
    <text x="300" y="104" fill="#6b7d99" font-size="9">CPU</text>
    <rect x="330" y="98" width="60" height="6" rx="3" fill="#13243f"/>
    <rect x="330" y="98" width="40" height="6" rx="3" fill="#fbbf24"/>
    <text x="396" y="104" fill="#6b7d99" font-size="9">RAM</text>

    <!-- VM2 -->
    <rect x="32" y="132" width="380" height="40" rx="8" fill="#0f1c33" stroke="#2a3c5e"/>
    <rect x="44" y="144" width="16" height="16" rx="3" fill="#7dd3fc"/>
    <text x="72" y="156" fill="#e6eef8" font-size="13" font-weight="600">VM2</text>
    <text x="120" y="156" fill="#6b7d99" font-size="11">VMware</text>
    <rect x="210" y="146" width="80" height="6" rx="3" fill="#13243f"/>
    <rect x="210" y="146" width="44" height="6" rx="3" fill="#34d399"/>
    <text x="300" y="152" fill="#6b7d99" font-size="9">CPU</text>
    <rect x="330" y="146" width="60" height="6" rx="3" fill="#13243f"/>
    <rect x="330" y="146" width="52" height="6" rx="3" fill="#fbbf24"/>
    <text x="396" y="152" fill="#6b7d99" font-size="9">RAM</text>

    <!-- VM3 -->
    <rect x="32" y="180" width="380" height="40" rx="8" fill="#0f1c33" stroke="#2a3c5e"/>
    <rect x="44" y="192" width="16" height="16" rx="3" fill="#8b5cf6"/>
    <text x="72" y="204" fill="#e6eef8" font-size="13" font-weight="600">VM3</text>
    <text x="120" y="204" fill="#6b7d99" font-size="11">Hyper-V</text>
    <rect x="210" y="194" width="80" height="6" rx="3" fill="#13243f"/>
    <rect x="210" y="194" width="68" height="6" rx="3" fill="#34d399"/>
    <text x="300" y="200" fill="#6b7d99" font-size="9">CPU</text>
    <rect x="330" y="194" width="60" height="6" rx="3" fill="#13243f"/>
    <rect x="330" y="194" width="32" height="6" rx="3" fill="#fbbf24"/>
    <text x="396" y="200" fill="#6b7d99" font-size="9">RAM</text>

    <!-- VM4 -->
    <rect x="32" y="228" width="380" height="40" rx="8" fill="#0f1c33" stroke="#2a3c5e"/>
    <rect x="44" y="240" width="16" height="16" rx="3" fill="#34d399"/>
    <text x="72" y="252" fill="#e6eef8" font-size="13" font-weight="600">VM4</text>
    <text x="120" y="252" fill="#6b7d99" font-size="11">Proxmox</text>
    <rect x="210" y="242" width="80" height="6" rx="3" fill="#13243f"/>
    <rect x="210" y="242" width="76" height="6" rx="3" fill="#ef4444"/>
    <text x="300" y="248" fill="#6b7d99" font-size="9">CPU</text>
    <rect x="330" y="242" width="60" height="6" rx="3" fill="#13243f"/>
    <rect x="330" y="242" width="48" height="6" rx="3" fill="#fbbf24"/>
    <text x="396" y="248" fill="#6b7d99" font-size="9">RAM</text>
  </g>

  <!-- Side guest OS chips -->
  <g>
    <rect x="436" y="84" width="172" height="184" rx="10" fill="#0d1830" stroke="#1d2c49"/>
    <text x="452" y="106" fill="#7dd3fc" font-size="12" font-weight="600">Guest OS</text>
    <circle cx="458" cy="128" r="5" fill="#38bdf8"/>
    <text x="472" y="132" fill="#e6eef8" font-size="11">Linux · 8 vCPU</text>
    <circle cx="458" cy="152" r="5" fill="#7dd3fc"/>
    <text x="472" y="156" fill="#e6eef8" font-size="11">Windows · 16GB</text>
    <circle cx="458" cy="176" r="5" fill="#8b5cf6"/>
    <text x="472" y="180" fill="#e6eef8" font-size="11">Linux · 4 vCPU</text>
    <circle cx="458" cy="200" r="5" fill="#34d399"/>
    <text x="472" y="204" fill="#e6eef8" font-size="11">BSD · 32GB</text>
    <text x="452" y="240" fill="#6b7d99" font-size="10">Snapshots · Live</text>
    <text x="452" y="256" fill="#6b7d99" font-size="10">migration ready</text>
  </g>

  <!-- Hypervisor layer -->
  <rect x="32" y="282" width="576" height="34" rx="8" fill="url(#hv)" opacity="0.18" stroke="#8b5cf6"/>
  <text x="48" y="304" fill="#e6eef8" font-size="13" font-weight="600">Hypervisor Layer</text>
  <text x="320" y="304" fill="#7dd3fc" font-size="11">Type-1 · resource scheduling</text>
  <!-- connectors -->
  <line x1="100" y1="268" x2="100" y2="282" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="220" y1="268" x2="220" y2="282" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="340" y1="268" x2="340" y2="282" stroke="#34d399" stroke-width="1.5"/>

  <!-- Physical server -->
  <rect x="32" y="330" width="576" height="50" rx="8" fill="#0f1c33" stroke="#2a3c5e"/>
  <text x="48" y="352" fill="#e6eef8" font-size="13" font-weight="600">Physical Server</text>
  <text x="48" y="368" fill="#6b7d99" font-size="10">Bare metal · CPU · RAM · Storage · NIC</text>
  <g>
    <rect x="430" y="342" width="26" height="26" rx="3" fill="#13243f" stroke="#2a3c5e"/>
    <rect x="436" y="348" width="14" height="3" rx="1" fill="#38bdf8"/>
    <rect x="436" y="354" width="14" height="3" rx="1" fill="#34d399"/>
    <rect x="436" y="360" width="14" height="3" rx="1" fill="#fbbf24"/>
    <rect x="466" y="342" width="26" height="26" rx="3" fill="#13243f" stroke="#2a3c5e"/>
    <circle cx="479" cy="355" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    <rect x="502" y="342" width="26" height="26" rx="3" fill="#13243f" stroke="#2a3c5e"/>
    <rect x="508" y="348" width="14" height="14" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="538" y="342" width="56" height="26" rx="3" fill="#13243f" stroke="#2a3c5e"/>
    <text x="566" y="359" fill="#6b7d99" font-size="9" text-anchor="middle">SSD</text>
  </g>
  <line x1="320" y1="316" x2="320" y2="330" stroke="#38bdf8" stroke-width="1.5"/>
</svg>
