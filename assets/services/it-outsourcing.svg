<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <!-- Header -->
  <text x="34" y="44" fill="#e6eef8" font-size="18" font-weight="600">Helpdesk</text>
  <text x="34" y="62" fill="#6b7d99" font-size="11">IT support / outsourcing</text>

  <!-- Ticket list panel -->
  <rect x="30" y="78" width="350" height="288" rx="10" fill="#0e1a30" stroke="#1d2c49"/>

  <!-- Ticket 1: open (red) -->
  <rect x="44" y="92" width="322" height="48" rx="8" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="62" cy="116" r="5" fill="#ef4444"/>
  <text x="80" y="112" fill="#e6eef8" font-size="12" font-weight="600">#4821 Server down</text>
  <text x="80" y="128" fill="#6b7d99" font-size="10">Open · priority high</text>
  <rect x="300" y="105" width="52" height="20" rx="10" fill="#2a1418" stroke="#ef4444"/>
  <text x="326" y="119" fill="#ef4444" font-size="9" text-anchor="middle">OPEN</text>

  <!-- Ticket 2: in-progress (yellow) -->
  <rect x="44" y="150" width="322" height="48" rx="8" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="62" cy="174" r="5" fill="#fbbf24"/>
  <text x="80" y="170" fill="#e6eef8" font-size="12" font-weight="600">#4820 VPN access</text>
  <text x="80" y="186" fill="#6b7d99" font-size="10">In progress · agent A.K.</text>
  <rect x="286" y="163" width="66" height="20" rx="10" fill="#2a2410" stroke="#fbbf24"/>
  <text x="319" y="177" fill="#fbbf24" font-size="9" text-anchor="middle">PROGRESS</text>

  <!-- Ticket 3: in-progress (cyan/violet) -->
  <rect x="44" y="208" width="322" height="48" rx="8" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="62" cy="232" r="5" fill="#38bdf8"/>
  <text x="80" y="228" fill="#e6eef8" font-size="12" font-weight="600">#4818 Email setup</text>
  <text x="80" y="244" fill="#6b7d99" font-size="10">In progress · agent M.R.</text>
  <rect x="286" y="221" width="66" height="20" rx="10" fill="#0e2336" stroke="#38bdf8"/>
  <text x="319" y="235" fill="#7dd3fc" font-size="9" text-anchor="middle">PROGRESS</text>

  <!-- Ticket 4: done (green) -->
  <rect x="44" y="266" width="322" height="48" rx="8" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="62" cy="290" r="5" fill="#34d399"/>
  <text x="80" y="286" fill="#e6eef8" font-size="12" font-weight="600">#4815 Printer fix</text>
  <text x="80" y="302" fill="#6b7d99" font-size="10">Resolved · closed</text>
  <rect x="300" y="279" width="52" height="20" rx="10" fill="#0f2a22" stroke="#34d399"/>
  <text x="326" y="293" fill="#34d399" font-size="9" text-anchor="middle">DONE</text>

  <!-- Ticket 5: done (green) -->
  <rect x="44" y="324" width="322" height="32" rx="8" fill="#0d1a30" stroke="#1d2c49"/>
  <circle cx="62" cy="340" r="5" fill="#34d399"/>
  <text x="80" y="344" fill="#6b7d99" font-size="11">#4811 Password reset · done</text>

  <!-- SLA timer panel -->
  <rect x="396" y="78" width="214" height="118" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
  <text x="412" y="100" fill="#6b7d99" font-size="11">SLA timer</text>
  <circle cx="503" cy="146" r="36" fill="none" stroke="#1d2c49" stroke-width="7"/>
  <path d="M503 110 a36 36 0 1 1 -31 54" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round"/>
  <text x="503" y="143" fill="#e6eef8" font-size="16" font-weight="700" text-anchor="middle">02:14</text>
  <text x="503" y="160" fill="#6b7d99" font-size="9" text-anchor="middle">to breach</text>
  <text x="568" y="100" fill="#34d399" font-size="11" text-anchor="end" font-weight="600">98%</text>

  <!-- Support agent + servers panel -->
  <rect x="396" y="206" width="214" height="160" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
  <text x="412" y="228" fill="#6b7d99" font-size="11">Agent &amp; infrastructure</text>

  <!-- Agent figure -->
  <circle cx="445" cy="278" r="16" fill="#0e2336" stroke="#7dd3fc" stroke-width="2"/>
  <circle cx="445" cy="273" r="6" fill="#7dd3fc"/>
  <path d="M433 292 a12 11 0 0 1 24 0" fill="#38bdf8"/>
  <!-- Headset -->
  <path d="M431 274 a14 14 0 0 1 28 0" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <rect x="428" y="273" width="5" height="9" rx="2" fill="#8b5cf6"/>
  <rect x="457" y="273" width="5" height="9" rx="2" fill="#8b5cf6"/>
  <path d="M431 282 q-4 6 2 10" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="433" cy="293" r="2.5" fill="#8b5cf6"/>
  <text x="445" y="320" fill="#6b7d99" font-size="9" text-anchor="middle">support agent</text>

  <!-- Connection -->
  <path d="M468 282 H512" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- Server rack -->
  <rect x="516" y="252" width="78" height="22" rx="4" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="526" cy="263" r="3" fill="#34d399"/>
  <rect x="536" y="261" width="40" height="4" rx="2" fill="#6b7d99"/>
  <rect x="582" y="259" width="6" height="8" rx="1" fill="#1d2c49"/>

  <rect x="516" y="280" width="78" height="22" rx="4" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="526" cy="291" r="3" fill="#34d399"/>
  <rect x="536" y="289" width="40" height="4" rx="2" fill="#6b7d99"/>
  <rect x="582" y="287" width="6" height="8" rx="1" fill="#1d2c49"/>

  <rect x="516" y="308" width="78" height="22" rx="4" fill="#101e38" stroke="#1d2c49"/>
  <circle cx="526" cy="319" r="3" fill="#fbbf24"/>
  <rect x="536" y="317" width="40" height="4" rx="2" fill="#6b7d99"/>
  <rect x="582" y="315" width="6" height="8" rx="1" fill="#1d2c49"/>
  <text x="555" y="348" fill="#6b7d99" font-size="9" text-anchor="middle">managed servers</text>
</svg>
