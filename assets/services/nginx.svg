<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <text x="32" y="44" fill="#e6eef8" font-size="18" font-weight="700">Nginx reverse proxy</text>
  <text x="32" y="64" fill="#6b7d99" font-size="12">load balanced upstreams</text>

  <!-- Clients -->
  <text x="92" y="108" fill="#6b7d99" font-size="11" text-anchor="middle">Clients</text>
  <g fill="#0e1a30" stroke="#38bdf8" stroke-width="1.5">
    <rect x="52" y="124" width="80" height="44" rx="8"/>
    <rect x="52" y="184" width="80" height="44" rx="8"/>
    <rect x="52" y="244" width="80" height="44" rx="8"/>
  </g>
  <g fill="#7dd3fc">
    <circle cx="74" cy="146" r="7"/><rect x="86" y="140" width="34" height="6" rx="3"/><rect x="86" y="150" width="24" height="5" rx="2.5" fill="#6b7d99"/>
    <circle cx="74" cy="206" r="7"/><rect x="86" y="200" width="34" height="6" rx="3"/><rect x="86" y="210" width="24" height="5" rx="2.5" fill="#6b7d99"/>
    <circle cx="74" cy="266" r="7"/><rect x="86" y="260" width="34" height="6" rx="3"/><rect x="86" y="270" width="24" height="5" rx="2.5" fill="#6b7d99"/>
  </g>

  <!-- https arrows clients -> nginx -->
  <g stroke="#34d399" stroke-width="2" fill="none">
    <path d="M132 146 H236" marker-end="url(#a)"/>
    <path d="M132 206 H236" marker-end="url(#a)"/>
    <path d="M132 266 H236" marker-end="url(#a)"/>
  </g>
  <text x="184" y="194" fill="#34d399" font-size="11" text-anchor="middle">https</text>

  <!-- Nginx box -->
  <rect x="244" y="150" width="120" height="112" rx="12" fill="#0e1a30" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="304" y="180" fill="#e6eef8" font-size="14" font-weight="700" text-anchor="middle">NGINX</text>
  <text x="304" y="198" fill="#6b7d99" font-size="10" text-anchor="middle">reverse proxy</text>
  <!-- SSL lock -->
  <g>
    <rect x="290" y="214" width="28" height="22" rx="4" fill="#fbbf24"/>
    <path d="M296 214 v-5 a8 8 0 0 1 16 0 v5" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <rect x="302" y="221" width="4" height="8" rx="2" fill="#0e1a30"/>
  </g>
  <text x="304" y="252" fill="#fbbf24" font-size="10" text-anchor="middle">SSL / TLS</text>

  <!-- balanced arrows nginx -> servers -->
  <g stroke="#38bdf8" stroke-width="2" fill="none">
    <path d="M364 200 C420 200 430 130 488 130" marker-end="url(#b)"/>
    <path d="M364 206 H488" marker-end="url(#b)"/>
    <path d="M364 212 C420 212 430 282 488 282" marker-end="url(#b)"/>
  </g>

  <!-- Upstream servers -->
  <text x="548" y="100" fill="#6b7d99" font-size="11" text-anchor="middle">App servers</text>
  <g>
    <rect x="492" y="108" width="100" height="46" rx="8" fill="#0e1a30" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="510" cy="131" r="5" fill="#34d399"/>
    <text x="525" y="128" fill="#e6eef8" font-size="11">app-1</text>
    <text x="525" y="143" fill="#34d399" font-size="9">200 OK</text>

    <rect x="492" y="183" width="100" height="46" rx="8" fill="#0e1a30" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="510" cy="206" r="5" fill="#34d399"/>
    <text x="525" y="203" fill="#e6eef8" font-size="11">app-2</text>
    <text x="525" y="218" fill="#34d399" font-size="9">200 OK</text>

    <rect x="492" y="258" width="100" height="46" rx="8" fill="#0e1a30" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="510" cy="281" r="5" fill="#34d399"/>
    <text x="525" y="278" fill="#e6eef8" font-size="11">app-3</text>
    <text x="525" y="293" fill="#34d399" font-size="9">200 OK</text>
  </g>

  <text x="424" y="338" fill="#6b7d99" font-size="11" text-anchor="middle">round-robin load balancing</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#34d399"/>
    </marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
