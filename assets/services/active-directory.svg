<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>
  <text x="28" y="36" fill="#e6eef8" font-size="16" font-weight="600">Active Directory</text>
  <text x="28" y="54" fill="#6b7d99" font-size="11">Domain tree &amp; Group Policy</text>

  <!-- connector lines -->
  <g stroke="#1d2c49" stroke-width="1.5" fill="none">
    <path d="M150 110 V150 H86 V172"/>
    <path d="M150 150 H214 V172"/>
    <!-- Sales OU children -->
    <path d="M86 214 V244 H56 V262"/>
    <path d="M86 244 H116 V262"/>
    <!-- IT OU children -->
    <path d="M214 214 V244 H184 V262"/>
    <path d="M214 244 H244 V262"/>
  </g>

  <!-- DOMAIN node -->
  <g>
    <rect x="98" y="78" width="104" height="32" rx="7" fill="#0e1b30" stroke="#8b5cf6"/>
    <circle cx="116" cy="94" r="6" fill="#8b5cf6"/>
    <text x="130" y="92" fill="#e6eef8" font-size="10" font-weight="600">corp.local</text>
    <text x="130" y="104" fill="#6b7d99" font-size="8">Domain</text>
  </g>

  <!-- OU: Sales -->
  <g>
    <rect x="44" y="172" width="84" height="42" rx="7" fill="#0e1b30" stroke="#38bdf8"/>
    <rect x="56" y="184" width="14" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M56 188 h6 l2 -2 h6" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="76" y="190" fill="#e6eef8" font-size="9.5" font-weight="600">OU: Sales</text>
    <text x="56" y="206" fill="#6b7d99" font-size="8">Org Unit</text>
  </g>

  <!-- OU: IT -->
  <g>
    <rect x="172" y="172" width="84" height="42" rx="7" fill="#0e1b30" stroke="#38bdf8"/>
    <rect x="184" y="184" width="14" height="11" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M184 188 h6 l2 -2 h6" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="204" y="190" fill="#e6eef8" font-size="9.5" font-weight="600">OU: IT</text>
    <text x="184" y="206" fill="#6b7d99" font-size="8">Org Unit</text>
  </g>

  <!-- User node (Sales) -->
  <g>
    <rect x="22" y="262" width="68" height="40" rx="7" fill="#0e1b30" stroke="#34d399"/>
    <circle cx="38" cy="278" r="4" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M32 290 a6 5 0 0 1 12 0" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="50" y="278" fill="#e6eef8" font-size="8.5" font-weight="600">j.smith</text>
    <text x="50" y="289" fill="#6b7d99" font-size="7.5">User</text>
  </g>

  <!-- Group node (Sales) -->
  <g>
    <rect x="104" y="262" width="68" height="40" rx="7" fill="#0e1b30" stroke="#7dd3fc"/>
    <circle cx="118" cy="278" r="3.5" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
    <circle cx="126" cy="278" r="3.5" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="136" y="278" fill="#e6eef8" font-size="8.5" font-weight="600">Reps</text>
    <text x="118" y="291" fill="#6b7d99" font-size="7.5">Group</text>
  </g>

  <!-- User node (IT) -->
  <g>
    <rect x="150" y="262" width="68" height="40" rx="7" fill="#0e1b30" stroke="#34d399"/>
    <circle cx="166" cy="278" r="4" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <path d="M160 290 a6 5 0 0 1 12 0" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <text x="178" y="278" fill="#e6eef8" font-size="8.5" font-weight="600">admin</text>
    <text x="178" y="289" fill="#6b7d99" font-size="7.5">User</text>
  </g>

  <!-- Group node (IT) -->
  <g>
    <rect x="232" y="262" width="74" height="40" rx="7" fill="#0e1b30" stroke="#7dd3fc"/>
    <circle cx="246" cy="278" r="3.5" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
    <circle cx="254" cy="278" r="3.5" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="264" y="278" fill="#e6eef8" font-size="8.5" font-weight="600">Domain Admins</text>
    <text x="246" y="291" fill="#6b7d99" font-size="7.5">Group</text>
  </g>

  <!-- divider -->
  <line x1="338" y1="70" x2="338" y2="350" stroke="#1d2c49" stroke-width="1"/>

  <!-- GPO / Policy panel -->
  <g>
    <rect x="362" y="78" width="252" height="246" rx="10" fill="#0c1626" stroke="#1d2c49"/>
    <text x="380" y="102" fill="#e6eef8" font-size="13" font-weight="600">Group Policy (GPO)</text>
    <rect x="380" y="112" width="60" height="16" rx="8" fill="#0e1b30" stroke="#fbbf24"/>
    <text x="392" y="124" fill="#fbbf24" font-size="9">Linked</text>

    <!-- policy rows -->
    <g font-size="10">
      <rect x="380" y="140" width="216" height="30" rx="6" fill="#0e1b30" stroke="#1d2c49"/>
      <circle cx="396" cy="155" r="4" fill="#34d399"/>
      <text x="410" y="153" fill="#e6eef8">Password Policy</text>
      <text x="410" y="165" fill="#6b7d99" font-size="8">min 12 chars · enabled</text>
      <text x="566" y="159" fill="#34d399" font-size="9">ON</text>

      <rect x="380" y="178" width="216" height="30" rx="6" fill="#0e1b30" stroke="#1d2c49"/>
      <circle cx="396" cy="193" r="4" fill="#34d399"/>
      <text x="410" y="191" fill="#e6eef8">Account Lockout</text>
      <text x="410" y="203" fill="#6b7d99" font-size="8">5 attempts · 15 min</text>
      <text x="566" y="197" fill="#34d399" font-size="9">ON</text>

      <rect x="380" y="216" width="216" height="30" rx="6" fill="#0e1b30" stroke="#1d2c49"/>
      <circle cx="396" cy="231" r="4" fill="#38bdf8"/>
      <text x="410" y="229" fill="#e6eef8">Drive Mapping</text>
      <text x="410" y="241" fill="#6b7d99" font-size="8">\\srv\share → Z:</text>
      <text x="566" y="235" fill="#38bdf8" font-size="9">SET</text>

      <rect x="380" y="254" width="216" height="30" rx="6" fill="#0e1b30" stroke="#1d2c49"/>
      <circle cx="396" cy="269" r="4" fill="#ef4444"/>
      <text x="410" y="267" fill="#e6eef8">USB Storage</text>
      <text x="410" y="279" fill="#6b7d99" font-size="8">blocked on workstations</text>
      <text x="560" y="273" fill="#ef4444" font-size="9">DENY</text>
    </g>

    <text x="380" y="308" fill="#6b7d99" font-size="9">Scope: corp.local → OU: IT</text>
  </g>

  <text x="28" y="380" fill="#6b7d99" font-size="9">LDAP · Kerberos · DNS-integrated directory</text>
</svg>
