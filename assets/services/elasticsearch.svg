    <text x="34" y="288" fill="#6b7d99">12:04:36</text>
    <rect x="140" y="280" width="40" height="13" rx="3" fill="#34d399" opacity="0.18"/>
    <text x="146" y="289" fill="#34d399" font-size="9" font-weight="600">INFO</text>
    <text x="210" y="288" fill="#e6eef8">cache warmed · 1,204 keys loaded</text>

