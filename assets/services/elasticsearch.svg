  <!-- index pill -->
  <rect x="512" y="362" width="96" height="14" rx="7" fill="#8b5cf6" opacity="0.18"/>
  <circle cx="522" cy="369" r="3" fill="#8b5cf6"/>
  <text x="530" y="372" fill="#8b5cf6" font-size="9">logs-2026.06</text>
