  <line x1="44.5" y1="71.5" x2="50" y2="77" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <text x="62" y="71" fill="#7dd3fc" font-size="12">level:ERROR AND service:</text>
  <text x="219" y="71" fill="#e6eef8" font-size="12">payments</text>
