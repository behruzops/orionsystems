    <rect x="392" y="142" width="20" height="16" rx="2" fill="#38bdf8"/>
    <rect x="420" y="124" width="20" height="34" rx="2" fill="#38bdf8"/>
    <rect x="448" y="110" width="20" height="48" rx="2" fill="#fbbf24"/>
    <rect x="476" y="128" width="20" height="30" rx="2" fill="#38bdf8"/>
    <rect x="504" y="136" width="20" height="22" rx="2" fill="#38bdf8"/>
    <rect x="532" y="120" width="20" height="38" rx="2" fill="#7dd3fc"/>
    <rect x="560" y="132" width="20" height="26" rx="2" fill="#38bdf8"/>
    <rect x="588" y="144" width="20" height="14" rx="2" fill="#38bdf8"/>
