  <text x="210" y="192" fill="#6b7d99" font-size="9">message</text>
  <line x1="28" y1="198" x2="612" y2="198" stroke="#1d2c49"/>

  <!-- log row template -->
  <g font-size="10.5">
    <!-- 1 INFO -->
    <text x="34" y="216" fill="#6b7d99">12:04:31</text>
    <rect x="140" y="208" width="40" height="13" rx="3" fill="#34d399" opacity="0.18"/>
    <text x="146" y="217" fill="#34d399" font-size="9" font-weight="600">INFO</text>
    <text x="210" y="216" fill="#e6eef8">request handled in 42ms · GET /api/orders</text>

