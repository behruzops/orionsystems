    <rect x="224" y="128" width="20" height="30" rx="2" fill="#38bdf8"/>
    <rect x="252" y="140" width="20" height="18" rx="2" fill="#38bdf8"/>
    <rect x="280" y="122" width="20" height="36" rx="2" fill="#7dd3fc"/>
    <rect x="308" y="134" width="20" height="24" rx="2" fill="#38bdf8"/>
    <rect x="336" y="116" width="20" height="42" rx="2" fill="#7dd3fc"/>
