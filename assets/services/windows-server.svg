<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <!-- window title bar -->
  <rect x="24" y="24" width="592" height="34" rx="8" fill="#0e1a30" stroke="#1d2c49"/>
  <!-- tiled window motif (4 panes) -->
  <g fill="none" stroke="#38bdf8" stroke-width="1.6">
    <rect x="36" y="33" width="7" height="7"/>
    <rect x="46" y="33" width="7" height="7"/>
    <rect x="36" y="43" width="7" height="7"/>
    <rect x="46" y="43" width="7" height="7"/>
  </g>
  <text x="64" y="46" fill="#e6eef8" font-size="13" font-weight="600">Server Manager — Dashboard</text>
  <circle cx="600" cy="41" r="5" fill="#ef4444"/>
  <circle cx="582" cy="41" r="5" fill="#fbbf24"/>

  <!-- LEFT: server roles list -->
  <rect x="24" y="70" width="250" height="306" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
  <text x="40" y="94" fill="#6b7d99" font-size="11" letter-spacing="1">SERVER ROLES</text>

  <!-- AD DS -->
  <g>
    <rect x="40" y="106" width="218" height="44" rx="8" fill="#0b1322" stroke="#1d2c49"/>
    <rect x="54" y="118" width="20" height="20" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1.6"/>
    <circle cx="64" cy="125" r="3" fill="#8b5cf6"/>
    <path d="M58 135 q6 -5 12 0" fill="none" stroke="#8b5cf6" stroke-width="1.6"/>
    <text x="88" y="124" fill="#e6eef8" font-size="13" font-weight="600">AD DS</text>
    <text x="88" y="139" fill="#6b7d99" font-size="10">Active Directory</text>
    <circle cx="244" cy="128" r="5" fill="#34d399"/>
  </g>

  <!-- File Services -->
  <g>
    <rect x="40" y="158" width="218" height="44" rx="8" fill="#0b1322" stroke="#1d2c49"/>
    <rect x="54" y="170" width="20" height="16" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
    <path d="M54 174 h20 M54 178 h20" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="88" y="176" fill="#e6eef8" font-size="13" font-weight="600">File Services</text>
    <text x="88" y="191" fill="#6b7d99" font-size="10">SMB / shares</text>
    <circle cx="244" cy="180" r="5" fill="#34d399"/>
  </g>

  <!-- RDS -->
  <g>
    <rect x="40" y="210" width="218" height="44" rx="8" fill="#0b1322" stroke="#1d2c49"/>
    <rect x="54" y="221" width="20" height="14" rx="2" fill="none" stroke="#7dd3fc" stroke-width="1.6"/>
    <path d="M61 235 h6 M64 235 v4 M59 239 h10" stroke="#7dd3fc" stroke-width="1.4"/>
    <text x="88" y="228" fill="#e6eef8" font-size="13" font-weight="600">RDS</text>
    <text x="88" y="243" fill="#6b7d99" font-size="10">Remote Desktop</text>
    <circle cx="244" cy="232" r="5" fill="#fbbf24"/>
  </g>

  <!-- DNS -->
  <g>
    <rect x="40" y="262" width="218" height="44" rx="8" fill="#0b1322" stroke="#1d2c49"/>
    <circle cx="64" cy="284" r="10" fill="none" stroke="#34d399" stroke-width="1.6"/>
    <path d="M54 284 h20 M64 274 v20 M57 278 q7 6 14 0 M57 290 q7 -6 14 0" fill="none" stroke="#34d399" stroke-width="1"/>
    <text x="88" y="280" fill="#e6eef8" font-size="13" font-weight="600">DNS Server</text>
    <text x="88" y="295" fill="#6b7d99" font-size="10">Name resolution</text>
    <circle cx="244" cy="284" r="5" fill="#34d399"/>
  </g>

  <text x="40" y="334" fill="#6b7d99" font-size="10">4 roles installed</text>
  <text x="40" y="352" fill="#34d399" font-size="10">3 healthy</text>
  <text x="118" y="352" fill="#fbbf24" font-size="10">1 warning</text>

  <!-- RIGHT: user rows -->
  <rect x="290" y="70" width="326" height="306" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
  <text x="306" y="94" fill="#6b7d99" font-size="11" letter-spacing="1">DIRECTORY USERS</text>
  <!-- column headers -->
  <text x="338" y="116" fill="#6b7d99" font-size="10">USER</text>
  <text x="476" y="116" fill="#6b7d99" font-size="10">ROLE</text>
  <text x="566" y="116" fill="#6b7d99" font-size="10">STATUS</text>
  <line x1="306" y1="124" x2="600" y2="124" stroke="#1d2c49"/>

  <!-- user rows -->
  <g font-size="11">
    <!-- row 1 -->
    <circle cx="320" cy="143" r="9" fill="#8b5cf6" opacity="0.25"/>
    <text x="320" y="147" fill="#7dd3fc" font-size="9" text-anchor="middle">JD</text>
    <text x="338" y="147" fill="#e6eef8">j.doe</text>
    <text x="476" y="147" fill="#6b7d99">Admin</text>
    <circle cx="578" cy="143" r="5" fill="#34d399"/>

    <!-- row 2 -->
    <circle cx="320" cy="175" r="9" fill="#38bdf8" opacity="0.25"/>
    <text x="320" y="179" fill="#7dd3fc" font-size="9" text-anchor="middle">AS</text>
    <text x="338" y="179" fill="#e6eef8">a.smith</text>
    <text x="476" y="179" fill="#6b7d99">Operator</text>
    <circle cx="578" cy="175" r="5" fill="#34d399"/>

    <!-- row 3 -->
    <circle cx="320" cy="207" r="9" fill="#34d399" opacity="0.25"/>
    <text x="320" y="211" fill="#7dd3fc" font-size="9" text-anchor="middle">MK</text>
    <text x="338" y="211" fill="#e6eef8">m.kim</text>
    <text x="476" y="211" fill="#6b7d99">User</text>
    <circle cx="578" cy="207" r="5" fill="#fbbf24"/>

    <!-- row 4 -->
    <circle cx="320" cy="239" r="9" fill="#fbbf24" opacity="0.25"/>
    <text x="320" y="243" fill="#7dd3fc" font-size="9" text-anchor="middle">RP</text>
    <text x="338" y="243" fill="#e6eef8">r.patel</text>
    <text x="476" y="243" fill="#6b7d99">User</text>
    <circle cx="578" cy="239" r="5" fill="#34d399"/>

    <!-- row 5 -->
    <circle cx="320" cy="271" r="9" fill="#ef4444" opacity="0.25"/>
    <text x="320" y="275" fill="#7dd3fc" font-size="9" text-anchor="middle">TZ</text>
    <text x="338" y="275" fill="#e6eef8">t.zheng</text>
    <text x="476" y="275" fill="#6b7d99">Service</text>
    <circle cx="578" cy="271" r="5" fill="#ef4444"/>
  </g>
  <line x1="306" y1="159" x2="600" y2="159" stroke="#13203a"/>
  <line x1="306" y1="191" x2="600" y2="191" stroke="#13203a"/>
  <line x1="306" y1="223" x2="600" y2="223" stroke="#13203a"/>
  <line x1="306" y1="255" x2="600" y2="255" stroke="#13203a"/>

  <!-- mini tiled window thumbnails footer -->
  <text x="306" y="306" fill="#6b7d99" font-size="10">SESSIONS</text>
  <g stroke="#1d2c49" fill="#0b1322">
    <rect x="306" y="314" width="64" height="44" rx="5"/>
    <rect x="378" y="314" width="64" height="44" rx="5"/>
    <rect x="450" y="314" width="64" height="44" rx="5"/>
    <rect x="522" y="314" width="78" height="44" rx="5"/>
  </g>
  <g fill="none" stroke-width="1.2">
    <rect x="312" y="320" width="52" height="6" stroke="#38bdf8"/>
    <rect x="312" y="330" width="52" height="20" stroke="#243a5e"/>
    <rect x="384" y="320" width="52" height="6" stroke="#8b5cf6"/>
    <rect x="384" y="330" width="52" height="20" stroke="#243a5e"/>
    <rect x="456" y="320" width="52" height="6" stroke="#34d399"/>
    <rect x="456" y="330" width="52" height="20" stroke="#243a5e"/>
    <rect x="528" y="320" width="66" height="6" stroke="#fbbf24"/>
    <rect x="528" y="330" width="66" height="20" stroke="#243a5e"/>
  </g>
</svg>
