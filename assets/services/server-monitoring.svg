<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="load" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <!-- header -->
  <circle cx="28" cy="30" r="6" fill="#34d399"/>
  <text x="42" y="34" fill="#e6eef8" font-size="15" font-weight="600">Server Health</text>
  <text x="612" y="34" text-anchor="end" fill="#6b7d99" font-size="11">srv-prod-01 · online</text>
  <line x1="20" y1="48" x2="620" y2="48" stroke="#1d2c49"/>

  <!-- gauges -->
  <g transform="translate(0,70)">
    <!-- CPU -->
    <g transform="translate(95,0)">
      <path d="M-40 36 A40 40 0 0 1 40 36" fill="none" stroke="#1d2c49" stroke-width="9" stroke-linecap="round"/>
      <path d="M-40 36 A40 40 0 0 1 32 -10" fill="none" stroke="#38bdf8" stroke-width="9" stroke-linecap="round"/>
      <text x="0" y="22" text-anchor="middle" fill="#e6eef8" font-size="18" font-weight="700">62%</text>
      <text x="0" y="56" text-anchor="middle" fill="#6b7d99" font-size="11">CPU</text>
    </g>
    <!-- RAM -->
    <g transform="translate(245,0)">
      <path d="M-40 36 A40 40 0 0 1 40 36" fill="none" stroke="#1d2c49" stroke-width="9" stroke-linecap="round"/>
      <path d="M-40 36 A40 40 0 0 1 40 36" fill="none" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
      <text x="0" y="22" text-anchor="middle" fill="#e6eef8" font-size="18" font-weight="700">78%</text>
      <text x="0" y="56" text-anchor="middle" fill="#6b7d99" font-size="11">RAM</text>
    </g>
    <!-- DISK -->
    <g transform="translate(395,0)">
      <path d="M-40 36 A40 40 0 0 1 40 36" fill="none" stroke="#1d2c49" stroke-width="9" stroke-linecap="round"/>
      <path d="M-40 36 A40 40 0 0 1 -8 -2" fill="none" stroke="#34d399" stroke-width="9" stroke-linecap="round"/>
      <text x="0" y="22" text-anchor="middle" fill="#e6eef8" font-size="18" font-weight="700">41%</text>
      <text x="0" y="56" text-anchor="middle" fill="#6b7d99" font-size="11">Disk</text>
    </g>
  </g>

  <!-- load line graph -->
  <g transform="translate(20,160)">
    <rect x="0" y="0" width="420" height="208" rx="10" fill="#0d1626" stroke="#1d2c49"/>
    <text x="14" y="24" fill="#e6eef8" font-size="12" font-weight="600">Load average</text>
    <text x="406" y="24" text-anchor="end" fill="#7dd3fc" font-size="11">1.84</text>

    <!-- grid -->
    <line x1="14" y1="64"  x2="406" y2="64"  stroke="#16233c"/>
    <line x1="14" y1="104" x2="406" y2="104" stroke="#16233c"/>
    <line x1="14" y1="144" x2="406" y2="144" stroke="#16233c"/>

    <!-- area + line -->
    <path d="M14 140 L70 120 L126 132 L182 96 L238 110 L294 74 L350 90 L406 60 L406 184 L14 184 Z" fill="url(#load)"/>
    <polyline points="14,140 70,120 126,132 182,96 238,110 294,74 350,90 406,60" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="406" cy="60" r="3.5" fill="#7dd3fc"/>

    <text x="14"  y="200" fill="#6b7d99" font-size="9">12:00</text>
    <text x="406" y="200" text-anchor="end" fill="#6b7d99" font-size="9">now</text>
  </g>

  <!-- process list -->
  <g transform="translate(452,160)">
    <rect x="0" y="0" width="168" height="208" rx="10" fill="#0d1626" stroke="#1d2c49"/>
    <text x="14" y="24" fill="#e6eef8" font-size="12" font-weight="600">Top processes</text>

    <g font-size="10">
      <g transform="translate(0,44)">
        <circle cx="18" cy="-3" r="3" fill="#8b5cf6"/>
        <text x="30" y="0" fill="#e6eef8">oracle</text>
        <text x="154" y="0" text-anchor="end" fill="#7dd3fc">31%</text>
      </g>
      <g transform="translate(0,72)">
        <circle cx="18" cy="-3" r="3" fill="#38bdf8"/>
        <text x="30" y="0" fill="#e6eef8">nginx</text>
        <text x="154" y="0" text-anchor="end" fill="#7dd3fc">14%</text>
      </g>
      <g transform="translate(0,100)">
        <circle cx="18" cy="-3" r="3" fill="#34d399"/>
        <text x="30" y="0" fill="#e6eef8">node</text>
        <text x="154" y="0" text-anchor="end" fill="#7dd3fc">11%</text>
      </g>
      <g transform="translate(0,128)">
        <circle cx="18" cy="-3" r="3" fill="#fbbf24"/>
        <text x="30" y="0" fill="#e6eef8">redis</text>
        <text x="154" y="0" text-anchor="end" fill="#7dd3fc">7%</text>
      </g>
      <g transform="translate(0,156)">
        <circle cx="18" cy="-3" r="3" fill="#ef4444"/>
        <text x="30" y="0" fill="#e6eef8">backup</text>
        <text x="154" y="0" text-anchor="end" fill="#7dd3fc">5%</text>
      </g>
      <g transform="translate(0,184)">
        <circle cx="18" cy="-3" r="3" fill="#6b7d99"/>
        <text x="30" y="0" fill="#6b7d99">system</text>
        <text x="154" y="0" text-anchor="end" fill="#6b7d99">3%</text>
      </g>
    </g>
  </g>
</svg>
