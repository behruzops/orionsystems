<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#070d18"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#bg)" stroke="#1d2c49"/>

  <!-- top bar -->
  <rect x="20" y="18" width="600" height="44" rx="9" fill="#0e1a30" stroke="#1d2c49"/>
  <circle cx="42" cy="40" r="6" fill="#38bdf8"/>
  <text x="58" y="45" font-size="16" font-weight="700" fill="#e6eef8">OrionDB Pro</text>
  <text x="165" y="45" font-size="15" fill="#6b7d99">·</text>
  <circle cx="558" cy="40" r="5" fill="#34d399"/>
  <text x="570" y="45" font-size="13" font-weight="700" fill="#34d399">LIVE</text>
  <text x="178" y="45" font-size="12" fill="#7dd3fc">DATABASES · 8 ONLINE</text>

  <!-- tiles -->
  <!-- row 1 -->
  <g>
    <rect x="20" y="82" width="146" height="86" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
    <circle cx="40" cy="104" r="7" fill="#34d399"/>
    <text x="56" y="109" font-size="13" font-weight="600" fill="#e6eef8">ORCL-PROD</text>
    <text x="34" y="138" font-size="11" fill="#6b7d99">SESS</text>
    <text x="34" y="153" font-size="13" font-weight="700" fill="#7dd3fc">142</text>
    <text x="96" y="138" font-size="11" fill="#6b7d99">CPU</text>
