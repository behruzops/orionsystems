  <g>
    <rect x="178" y="184" width="146" height="86" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
    <circle cx="198" cy="206" r="7" fill="#34d399"/>
    <text x="214" y="211" font-size="13" font-weight="600" fill="#e6eef8">PG-BILL</text>
    <text x="192" y="240" font-size="11" fill="#6b7d99">SESS</text>
    <text x="192" y="255" font-size="13" font-weight="700" fill="#7dd3fc">73</text>
    <text x="254" y="240" font-size="11" fill="#6b7d99">CPU</text>
    <text x="254" y="255" font-size="13" font-weight="700" fill="#34d399">29%</text>
  </g>
  <g>
    <rect x="336" y="184" width="146" height="86" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
    <circle cx="356" cy="206" r="7" fill="#34d399"/>
    <text x="372" y="211" font-size="13" font-weight="600" fill="#e6eef8">MONGO-IOT</text>
    <text x="350" y="240" font-size="11" fill="#6b7d99">SESS</text>
    <text x="350" y="255" font-size="13" font-weight="700" fill="#7dd3fc">120</text>
    <text x="412" y="240" font-size="11" fill="#6b7d99">CPU</text>
    <text x="412" y="255" font-size="13" font-weight="700" fill="#34d399">44%</text>
  </g>
  <g>
    <rect x="494" y="184" width="126" height="86" rx="10" fill="#0e1a30" stroke="#fbbf24" stroke-opacity="0.5"/>
    <circle cx="514" cy="206" r="7" fill="#fbbf24"/>
    <text x="530" y="211" font-size="13" font-weight="600" fill="#e6eef8">REDIS-CA</text>
    <text x="508" y="240" font-size="11" fill="#6b7d99">SESS</text>
    <text x="508" y="255" font-size="13" font-weight="700" fill="#7dd3fc">305</text>
    <text x="572" y="240" font-size="11" fill="#6b7d99">CPU</text>
    <text x="572" y="255" font-size="13" font-weight="700" fill="#fbbf24">68%</text>
  </g>

  <!-- footer status legend -->
  <rect x="20" y="286" width="600" height="92" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
  <text x="36" y="312" font-size="12" font-weight="700" fill="#e6eef8">CLUSTER HEALTH</text>

  <circle cx="42" cy="338" r="6" fill="#34d399"/>
  <text x="56" y="342" font-size="12" fill="#6b7d99">Healthy</text>
  <text x="56" y="360" font-size="14" font-weight="700" fill="#34d399">5</text>

  <circle cx="152" cy="338" r="6" fill="#fbbf24"/>
  <text x="166" y="342" font-size="12" fill="#6b7d99">Warning</text>
  <text x="166" y="360" font-size="14" font-weight="700" fill="#fbbf24">2</text>

  <circle cx="266" cy="338" r="6" fill="#ef4444"/>
  <text x="280" y="342" font-size="12" fill="#6b7d99">Critical</text>
  <text x="280" y="360" font-size="14" font-weight="700" fill="#ef4444">1</text>

  <!-- mini activity bars -->
  <g fill="#8b5cf6">
    <rect x="470" y="350" width="8" height="14" rx="2"/>
    <rect x="484" y="342" width="8" height="22" rx="2"/>
    <rect x="498" y="334" width="8" height="30" rx="2" fill="#38bdf8"/>
    <rect x="512" y="346" width="8" height="18" rx="2"/>
    <rect x="526" y="338" width="8" height="26" rx="2" fill="#7dd3fc"/>
    <rect x="540" y="352" width="8" height="12" rx="2"/>
    <rect x="554" y="330" width="8" height="34" rx="2" fill="#38bdf8"/>
    <rect x="568" y="344" width="8" height="20" rx="2"/>
    <rect x="582" y="348" width="8" height="16" rx="2" fill="#7dd3fc"/>
    <rect x="596" y="336" width="8" height="28" rx="2"/>
  </g>
  <text x="470" y="324" font-size="11" fill="#6b7d99">THROUGHPUT 60s</text>
</svg>
