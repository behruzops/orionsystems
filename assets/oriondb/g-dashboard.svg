    <text x="214" y="109" font-size="13" font-weight="600" fill="#e6eef8">PG-CORE</text>
    <text x="192" y="138" font-size="11" fill="#6b7d99">SESS</text>
    <text x="192" y="153" font-size="13" font-weight="700" fill="#7dd3fc">88</text>
    <text x="254" y="138" font-size="11" fill="#6b7d99">CPU</text>
    <text x="254" y="153" font-size="13" font-weight="700" fill="#34d399">21%</text>
  </g>
  <g>
    <rect x="336" y="82" width="146" height="86" rx="10" fill="#0e1a30" stroke="#fbbf24" stroke-opacity="0.5"/>
    <circle cx="356" cy="104" r="7" fill="#fbbf24"/>
    <text x="372" y="109" font-size="13" font-weight="600" fill="#e6eef8">MSSQL-RPT</text>
    <text x="350" y="138" font-size="11" fill="#6b7d99">SESS</text>
    <text x="350" y="153" font-size="13" font-weight="700" fill="#7dd3fc">211</text>
    <text x="412" y="138" font-size="11" fill="#6b7d99">CPU</text>
    <text x="412" y="153" font-size="13" font-weight="700" fill="#fbbf24">74%</text>
  </g>
  <g>
    <rect x="494" y="82" width="126" height="86" rx="10" fill="#0e1a30" stroke="#1d2c49"/>
    <circle cx="514" cy="104" r="7" fill="#34d399"/>
    <text x="530" y="109" font-size="13" font-weight="600" fill="#e6eef8">MY-WEB</text>
    <text x="508" y="138" font-size="11" fill="#6b7d99">SESS</text>
    <text x="508" y="153" font-size="13" font-weight="700" fill="#7dd3fc">57</text>
    <text x="572" y="138" font-size="11" fill="#6b7d99">CPU</text>
    <text x="572" y="153" font-size="13" font-weight="700" fill="#34d399">16%</text>
  </g>

  <!-- row 2 -->
  <!-- RED pulsing tile -->
  <g>
    <rect x="20" y="184" width="146" height="86" rx="10" fill="#1a0e12" stroke="#ef4444">
      <animate attributeName="stroke-opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <circle cx="40" cy="206" r="7" fill="#ef4444">
      <animate attributeName="r" values="7;10;7" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="58" y="211" font-size="13" font-weight="700" fill="#e6eef8">ORCL-DWH</text>
    <text x="34" y="240" font-size="11" fill="#6b7d99">SESS</text>
    <text x="34" y="255" font-size="13" font-weight="700" fill="#7dd3fc">498</text>
    <text x="96" y="240" font-size="11" fill="#6b7d99">CPU</text>
    <text x="96" y="255" font-size="13" font-weight="700" fill="#ef4444">97%</text>
