<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="tgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17212b"/>
      <stop offset="1" stop-color="#0e1621"/>
    </linearGradient>
    <linearGradient id="tgBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2aabee"/>
      <stop offset="1" stop-color="#229ed9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="640" height="400" rx="14" fill="url(#tgBg)" stroke="#22303c" stroke-width="1.5"/>

  <!-- chat header -->
  <rect x="0" y="0" width="640" height="56" rx="14" fill="#17212b"/>
  <rect x="0" y="42" width="640" height="14" fill="#17212b"/>
  <circle cx="36" cy="28" r="18" fill="url(#tgBtn)"/>
  <!-- telegram paper plane -->
  <path d="M27 28 l18 -7 l-6 16 l-4 -6 z" fill="#ffffff"/>
  <text x="64" y="24" fill="#ffffff" font-size="14" font-weight="700">Monitoring Alert Bot</text>
  <text x="64" y="40" fill="#6d8095" font-size="11">bot · DBA group · 4 members</text>
  <circle cx="600" cy="28" r="4" fill="#4dd05a"/>

  <!-- date pill -->
  <rect x="280" y="70" width="80" height="22" rx="11" fill="#1c2733"/>
  <text x="320" y="85" fill="#8aa0b6" font-size="10" text-anchor="middle">Today</text>

  <!-- CRITICAL alert bubble -->
  <g>
    <rect x="40" y="104" width="430" height="150" rx="12" fill="#1f2c39" stroke="#7f1d1d" stroke-width="1.5"/>
    <rect x="40" y="104" width="6" height="150" rx="3" fill="#ef4444"/>
    <text x="60" y="128" fill="#ff6b6b" font-size="14" font-weight="700">🔴 CRITICAL ALERT</text>
    <line x1="60" y1="138" x2="452" y2="138" stroke="#2c3a48" stroke-width="1"/>

    <text x="60" y="160" fill="#7e94a8" font-size="11">Database:</text>
    <text x="160" y="160" fill="#e7eef5" font-size="11" font-weight="600">PROD_PAY (10.20.3.14)</text>
    <text x="60" y="180" fill="#7e94a8" font-size="11">Schema:</text>
    <text x="160" y="180" fill="#e7eef5" font-size="11" font-weight="600">BILLING_APP</text>
    <text x="60" y="200" fill="#7e94a8" font-size="11">Issue:</text>
    <text x="160" y="200" fill="#ffb4b4" font-size="11" font-weight="600">row lock contention · 17 blocked</text>
    <text x="60" y="220" fill="#7e94a8" font-size="11">Module:</text>
    <text x="160" y="220" fill="#e7eef5" font-size="11" font-weight="600">PaymentBatch / SQL b3f9a1</text>
    <text x="60" y="240" fill="#7e94a8" font-size="11">Owner:</text>
    <text x="160" y="240" fill="#e7eef5" font-size="11" font-weight="600">@dba_oncall</text>

    <text x="438" y="248" fill="#5b6b7c" font-size="9" text-anchor="end">09:41 ✓✓</text>
  </g>

  <!-- WARN bubble -->
  <g>
    <rect x="40" y="266" width="320" height="56" rx="12" fill="#1f2c39" stroke="#7a5b12" stroke-width="1.5"/>
    <rect x="40" y="266" width="6" height="56" rx="3" fill="#fbbf24"/>
    <text x="60" y="288" fill="#f2cc0c" font-size="12" font-weight="700">🟡 WARNING · DWH_BILLING</text>
    <text x="60" y="308" fill="#cdd9e3" font-size="11">tablespace USERS used 86%</text>
    <text x="330" y="316" fill="#5b6b7c" font-size="9" text-anchor="end">09:38 ✓✓</text>
  </g>

  <!-- resolved bubble -->
  <g>
    <rect x="40" y="332" width="300" height="40" rx="12" fill="#1f2c39" stroke="#1c5e3f" stroke-width="1.5"/>
    <rect x="40" y="332" width="6" height="40" rx="3" fill="#34d399"/>
    <text x="60" y="357" fill="#7ee2b8" font-size="12" font-weight="700">🟢 RESOLVED · PROD_CORE backup OK</text>
  </g>

  <!-- input bar -->
  <rect x="40" y="380" width="560" height="2" fill="#22303c"/>
</svg>
