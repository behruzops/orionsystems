<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="mkLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="mkStar" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9ec5ff"/>
    </radialGradient>
    <radialGradient id="mkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#bfe2ff"/>
      <stop offset="0.6" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="#070b15" stroke="#1c2b48" stroke-width="1.5"/>
  <!-- orbit ring -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#1b2a45" stroke-width="1" stroke-dasharray="3 6"/>
  <!-- constellation -->
  <g stroke="url(#mkLine)" stroke-width="1.6" opacity="0.55" fill="none">
    <path d="M40 28 L54 52 L48 86 M82 32 L62 52 L78 88 M54 52 L62 52 M48 86 L78 88"/>
  </g>
  <circle cx="40" cy="28" r="3.4" fill="url(#mkStar)"/>
  <circle cx="82" cy="32" r="2.8" fill="url(#mkStar)"/>
  <circle cx="54" cy="52" r="2.6" fill="#cfe3ff"/>
  <circle cx="62" cy="52" r="2.6" fill="#cfe3ff"/>
  <circle cx="48" cy="86" r="3.6" fill="url(#mkStar)"/>
  <circle cx="78" cy="88" r="3" fill="url(#mkStar)"/>
  <!-- central glow core -->
  <circle cx="60" cy="60" r="16" fill="url(#mkCore)"/>
  <circle cx="40" cy="28" r="6" fill="#ff7a59" opacity="0.25"/>
</svg>
