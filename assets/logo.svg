<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="lgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="lgStar" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </radialGradient>
  </defs>

  <!-- Orion constellation mark -->
  <g>
    <!-- connecting lines (hourglass) -->
    <g stroke="url(#lgGlow)" stroke-width="1.4" opacity="0.5" fill="none">
      <path d="M14 10 L26 26 L22 50 M44 12 L30 26 L40 52 M26 26 L30 26 L34 26 M22 50 L40 52"/>
    </g>
    <!-- stars -->
    <circle cx="14" cy="10" r="3" fill="url(#lgStar)"/>
    <circle cx="44" cy="12" r="2.4" fill="url(#lgStar)"/>
    <circle cx="26" cy="26" r="2.2" fill="#cfe3ff"/>
    <circle cx="30" cy="26" r="1.8" fill="#cfe3ff"/>
    <circle cx="34" cy="26" r="2.2" fill="#cfe3ff"/>
    <circle cx="22" cy="50" r="3.2" fill="url(#lgStar)"/>
    <circle cx="40" cy="52" r="2.6" fill="url(#lgStar)"/>
    <!-- betelgeuse accent -->
    <circle cx="14" cy="10" r="5" fill="#ff7a59" opacity="0.28"/>
  </g>

  <!-- wordmark -->
  <text x="62" y="34" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#eaf2ff">Orion<tspan fill="url(#lgGlow)">Systems</tspan></text>
  <text x="63" y="50" font-size="9.5" font-weight="600" letter-spacing="3" fill="#6c84a6">IT · DEVOPS · MONITORING</text>
</svg>
