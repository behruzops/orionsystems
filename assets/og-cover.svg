<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI',Arial,sans-serif">
  <!-- solid fills so it renders identically as a PNG for OG crawlers -->
  <rect width="1200" height="630" fill="#070d18"/>
  <rect width="1200" height="320" fill="#0a1224"/>
  <rect y="320" width="1200" height="310" fill="#080a18"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="1.8" opacity="0.7"/><circle cx="300" cy="160" r="1.3" opacity="0.5"/><circle cx="520" cy="80" r="2" opacity="0.8"/>
    <circle cx="980" cy="90" r="1.4" opacity="0.6"/><circle cx="1080" cy="250" r="1.8" opacity="0.7"/><circle cx="200" cy="430" r="1.5" opacity="0.6"/>
    <circle cx="160" cy="560" r="1.3" opacity="0.5"/><circle cx="1010" cy="540" r="1.7" opacity="0.7"/><circle cx="1140" cy="450" r="1.3" opacity="0.5"/>
  </g>
  <!-- Orion emblem -->
  <g transform="translate(905,300)">
    <g stroke="#e6b450" stroke-width="2.4" opacity="0.6" fill="none">
      <path d="M-70 -120 L-10 -10 L-40 130 M80 -110 L20 -10 L70 140 M-10 -10 L20 -10 M-40 130 L70 140"/>
    </g>
    <circle cx="-70" cy="-120" r="22" fill="#ff7a59" opacity="0.22"/>
    <circle cx="-70" cy="-120" r="9" fill="#ffffff"/><circle cx="80" cy="-110" r="7" fill="#cfe3ff"/>
    <circle cx="-10" cy="-10" r="6" fill="#cfe3ff"/><circle cx="20" cy="-10" r="6" fill="#cfe3ff"/>
    <circle cx="-40" cy="130" r="10" fill="#9ec5ff"/><circle cx="70" cy="140" r="8" fill="#cfe3ff"/>
  </g>
  <!-- wordmark -->
  <text x="90" y="300" font-size="86" font-weight="800" letter-spacing="-2" fill="#eaf2ff">Orion<tspan fill="#e6b450">Systems</tspan></text>
  <text x="94" y="356" font-size="30" font-weight="600" fill="#9fb4d0">IT · DevOps · Monitoring</text>
  <text x="94" y="432" font-size="26" fill="#cbd9ee">Oracle bazalar · serverlar · real vaqtli monitoring</text>
  <!-- chips -->
  <g font-size="20" font-weight="600">
    <rect x="94" y="472" width="160" height="46" rx="23" fill="#0e2030" stroke="#2a6f8e"/><text x="174" y="501" fill="#7dd3fc" text-anchor="middle">ORIONDB</text>
    <rect x="268" y="472" width="150" height="46" rx="23" fill="#171436" stroke="#5b4a8e"/><text x="343" y="501" fill="#c4b5fd" text-anchor="middle">On-prem</text>
    <rect x="432" y="472" width="190" height="46" rx="23" fill="#0c241c" stroke="#2f7d63"/><text x="527" y="501" fill="#6ee7b7" text-anchor="middle">UZ · RU · EN</text>
  </g>
</svg>
